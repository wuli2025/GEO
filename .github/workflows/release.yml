# ─────────────────────────────────────────────────────────────
# 发版 + 自动更新产物发布（跨平台：Windows + macOS）
# 打一个 v* 标签（如 v0.2.10）推上来，会在 Windows 与 macOS 两个 runner 上并行
# 构建、用更新私钥签名，并把各自的安装包 + .sig + latest.json 上传到同一个 GitHub Release。
#   · Windows → NSIS 安装包（.exe）
#   · macOS   → universal（Intel + Apple Silicon 通用）.dmg / .app
# tauri-action 会把两端的平台条目合并进同一份 latest.json，应用端据此自动升级。
#
# 需要在仓库 Settings → Secrets and variables → Actions 配置：
#   TAURI_SIGNING_PRIVATE_KEY           = 更新私钥文件全文（单行无换行）
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  = 更新私钥密码
#
# 关于 macOS 签名/公证（可选，未配则产未签名包）：
#   未签名 .dmg 用户首次打开会被 Gatekeeper 拦，需右键→打开，或
#   `xattr -dr com.apple.quarantine /Applications/Polaris.app`。
#   若要消除提示并让 mac 自动更新稳定生效，再补这些 secret 并在 tauri.conf 配 signingIdentity：
#   APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY /
#   APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID（这里默认不强制，留空即跳过签名）。
# ─────────────────────────────────────────────────────────────
name: release

on:
  push:
    tags:
      - "v*"

jobs:
  verify:
    name: Verify tagged source
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm run build
      # tauri.windows.conf.json 把 runtime/{uv,python,git} 声明成**显式**资源路径，
      # tauri-build 的 build script 会逐条校验它们存在——连 `cargo test` 也跑这道校验。
      # 但 runtime/ 是 .gitignore 的，只有 `tauri build` 的 beforeBuildCommand 才会
      # 调 fetch-runtimes.mjs 抓下来，所以干净检出上 cargo test 必挂在
      # 「resource path `runtime\git` doesn't exist」。
      # 这里只补空壳让资源校验过关：本 job 只跑 cargo test --lib / cargo check，
      # 不碰运行时内容；真正的 227MB 抓取仍由下面 release job 的 tauri build 负责。
      - name: Stub bundled runtime dirs (resource validation only)
        working-directory: src-tauri
        run: |
          foreach ($d in "runtime/uv", "runtime/python", "runtime/git") {
            New-Item -ItemType Directory -Force -Path $d | Out-Null
            New-Item -ItemType File -Force -Path "$d/.keep" | Out-Null
          }
      - name: Rust library tests
        working-directory: src-tauri
        run: cargo test --lib
      - name: CLI compile guard
        working-directory: src-tauri
        run: cargo check -p polaris-cli

  release:
    needs: verify
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows：只出 NSIS 安装包（保持与原有产物一致）
          # --features voice-live：桌面实时语音输入(麦克风 cpal+热键 rdev+注入 enigo,
          #   自动带上 voice-asr 的 sherpa-onnx + SenseVoice 识别核)。
          #   注:voice-asr 已拆分为「仅识别核」,桌面要本机录音必须用 voice-live。
          - platform: windows-latest
            args: "--bundles nsis --features voice-live"
            rust_targets: ""
          # macOS：universal 通用二进制（一个包同时覆盖 Intel 与 Apple Silicon）
          # 本版 mac 暂不开 voice-live：universal 需把两架构的 sherpa/onnxruntime dylib lipo
          # 成通用并配 @rpath,这套无 mac 真机/CI 无法验证;缺 dylib 会导致 app 启动即崩,
          # 风险太高。mac 本地语音延后到能在 mac CI 验证后再补(Win 已端到端实测,先发 Win)。
          - platform: macos-latest
            args: "--target universal-apple-darwin --bundles app,dmg"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      # voice-asr 的 sherpa-rs 用 bindgen 生成绑定 → 需 libclang。
      #   · Windows runner 预装 LLVM 于 C:\Program Files\LLVM,显式指给 bindgen 最稳。
      #   · macOS 的 libclang 随 Xcode 命令行工具走,clang-sys 经 xcrun 自动发现,无需额外装。
      - name: Point bindgen at libclang (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $p = "C:\Program Files\LLVM\bin"
          if (-not (Test-Path "$p\libclang.dll")) { choco install llvm -y }
          "LIBCLANG_PATH=$p" | Out-File -FilePath $env:GITHUB_ENV -Append

      # macOS：audiopus_sys 从源码静态编译 libopus(universal 每个 arch 各编一次),
      # 需要 autotools(autoreconf/automake/libtool)。runner 默认没有 autoreconf,
      # 不装会报 `autoreconf: command not found` → Failed to autogen Opus。
      # 不走 `brew install opus`：Homebrew 只出 host 架构(arm64),x86_64 slice 链不上。
      - name: Install macOS build deps (autotools for audiopus/libopus)
        if: matrix.platform == 'macos-latest'
        run: brew install autoconf automake libtool

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm install

      - name: Build, sign & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # 不传任何 APPLE_* 环境变量：空字符串会让 Tauri 的 bundler 误以为有证书而尝试
          # `security import ""` → SecKeychainItemImport 失败。mac 走 ad-hoc 签名
          # (tauri.conf bundle.macOS.signingIdentity = "-")，根本不需要 Apple 证书。
        with:
          # tauri-action 只负责「构建 + 用更新私钥签名」,不在此处建 Release:
          # 两个平台的产物要合并进同一份 latest.json,得等两边都跑完 → 交给下面的 publish job。
          args: ${{ matrix.args }}

      - name: Upload bundles as artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.platform }}
          if-no-files-found: error
          retention-days: 30
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/universal-apple-darwin/release/bundle/**

  # ─────────────────────────────────────────────────────────────
  # 发布：等两个平台都构建完 → 收齐安装包与 .sig → 合并成一份 latest.json →
  # 建 GitHub Release 并把三者一起上传。应用端的更新端点
  # (tauri.conf plugins.updater.endpoints) 读的就是 releases/latest/download/latest.json。
  #
  # token 优先用 GH_PAT(仓库 Secrets 里配一个有 repo/contents:write 权限的 PAT)。
  # 本账号的 Actions GITHUB_TOKEN 建 Release 曾返回 "Resource not accessible by
  # integration",配了 GH_PAT 就绕开;没配则回落 GITHUB_TOKEN 再试一次。
  # ─────────────────────────────────────────────────────────────
  publish:
    name: Publish release + latest.json
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect bundles & build latest.json
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          mkdir -p dist
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"

          # Windows: NSIS 安装包 + 其 .sig(createUpdaterArtifacts=true 时由 tauri 生成)
          win_exe=$(find artifacts -path '*/nsis/*' -name '*-setup.exe' | head -1)
          win_sig=$(find artifacts -path '*/nsis/*' -name '*-setup.exe.sig' | head -1)
          # macOS: 更新走 .app.tar.gz(不是 dmg);dmg 只作为人工下载用
          mac_tar=$(find artifacts -name '*.app.tar.gz' | head -1)
          mac_sig=$(find artifacts -name '*.app.tar.gz.sig' | head -1)
          mac_dmg=$(find artifacts -name '*.dmg' | head -1)

          [ -n "$win_exe" ] && [ -n "$win_sig" ] || { echo "::error::缺 Windows 安装包或其 .sig"; exit 1; }
          [ -n "$mac_tar" ] && [ -n "$mac_sig" ] || { echo "::error::缺 macOS .app.tar.gz 或其 .sig"; exit 1; }

          # 文件名先规范化再上传:productName "Polaris GEO" 带空格,而 GitHub 收资产时
          # 会把空格换成点(Polaris GEO_x64-setup.exe → Polaris.GEO_x64-setup.exe)。
          # 若照搬本地名拼 URL,latest.json 指向的地址在 Release 上并不存在 → 更新器 404。
          # (v0.1.0 实测踩过)。自己先 tr ' ' '.',上传名与 URL 名必然一致。
          win_name=$(basename "$win_exe" | tr ' ' '.')
          mac_name=$(basename "$mac_tar" | tr ' ' '.')
          cp "$win_exe" "dist/$win_name"
          cp "$mac_tar" "dist/$mac_name"
          if [ -n "$mac_dmg" ]; then cp "$mac_dmg" "dist/$(basename "$mac_dmg" | tr ' ' '.')"; fi

          # latest.json:两个平台合进同一份。mac 是 universal 包,两个架构键都指向它。
          python3 - "$VERSION" "$base" "$win_name" "$win_sig" \
                    "$mac_name" "$mac_sig" <<'PY'
          import json, sys, datetime, pathlib
          version, base, win_name, win_sig, mac_name, mac_sig = sys.argv[1:7]
          win_url = f"{base}/{win_name}"
          mac_url = f"{base}/{mac_name}"
          mac_sig_text = pathlib.Path(mac_sig).read_text().strip()
          entry = {"signature": mac_sig_text, "url": mac_url}
          out = {
              "version": version,
              "notes": f"Polaris · GEO {version}",
              "pub_date": datetime.datetime.now(datetime.timezone.utc)
                  .strftime("%Y-%m-%dT%H:%M:%SZ"),
              "platforms": {
                  "windows-x86_64": {
                      "signature": pathlib.Path(win_sig).read_text().strip(),
                      "url": win_url,
                  },
                  "darwin-x86_64": entry,
                  "darwin-aarch64": entry,
              },
          }
          pathlib.Path("dist/latest.json").write_text(
              json.dumps(out, ensure_ascii=False, indent=2))
          print(json.dumps(out, ensure_ascii=False, indent=2))
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: Polaris · GEO ${{ github.ref_name }}
          prerelease: false
          # 必须是 latest release,应用端读的是 /releases/latest/download/latest.json
          make_latest: true
          files: dist/*

      # ── 自托管分发（Cloudflare R2）─────────────────────────────
      # 客户端 endpoints 第一顺位是 R2 上的 downloads/latest.json,updater.rs::mirror_candidates
      # 下载安装包时也把它排第二(首个 github 镜像一卡死就切过来)。必须与 GitHub Release 同版本
      # 同步,否则自托管源会一直供旧包。
      #
      # 用 R2 而非 Pages:Pages 单文件上限 25MiB,而 mac 的 .app.tar.gz 已 33MB(v0.1.0 实测)。
      #
      # 两个渠道共用同一份 latest.json(里面的 url 指向 github),自托管那一跳由客户端按文件名拼,
      # 因此 R2 掉线/限流时客户端仍能回落 github,不会把自己锁死在单一渠道。
      #
      # 需在仓库 Secrets 配 CLOUDFLARE_API_TOKEN(Object Read & Write) 与 CLOUDFLARE_ACCOUNT_ID。
      # 本仓是 public,github 匿名可下 → 没配 secret 时只 warning、不阻断发版(与教师助手那个
      # private 仓不同,那边自托管是唯一活源所以必须红)。但 endpoints 首位会因此供旧包 → 别长期不配。
      - name: Upload to Cloudflare R2
        id: r2
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::warning::未配 CLOUDFLARE_API_TOKEN/ACCOUNT_ID,跳过 R2。endpoints 首位 geo-dl 将继续供旧版本,国内用户回落 github 镜像。"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # latest.json 最后传:装包先就位,避免「latest.json 已指新版、包还没上去」的空窗期。
          for f in $(ls dist | grep -v '^latest.json$'); do
            echo "→ $f"
            npx --yes wrangler@4 r2 object put "geo-dist/downloads/$f" \
              --file "dist/$f" --remote
          done
          npx --yes wrangler@4 r2 object put "geo-dist/downloads/latest.json" \
            --file dist/latest.json --content-type application/json --remote
          echo "skipped=false" >> "$GITHUB_OUTPUT"

      # 自托管端点必须实测拿到「真 JSON 且版本号对得上」,而不是只看 HTTP 200。
      # geo-dl 若未绑到 R2 桶而落到 Pages 站,任意路径都会回 200 + SPA 首页 HTML —— 只看状态码
      # 会把这种静默失效当成功(llmwiki.cloud 就是这个行为,实测过)。所以这里解析 JSON 比版本号。
      - name: Verify self-hosted endpoint
        if: steps.r2.outputs.skipped == 'false'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          BASE="https://geo-dl.llmwiki.cloud/downloads"
          ok=0
          for i in 1 2 3 4 5; do
            got=$(curl -fsSL --max-time 30 "$BASE/latest.json" \
              | python3 -c 'import json,sys; print(json.load(sys.stdin)["version"])' 2>/dev/null || echo "")
            if [ "$got" = "$VERSION" ]; then echo "OK  $BASE/latest.json → $got"; ok=1; break; fi
            echo "  retry $i: 期望 $VERSION, 实得 '${got:-<非JSON或不可达>}'"
            sleep 5
          done
          [ "$ok" = "1" ] || { echo "::error::自托管端点 $BASE/latest.json 没返回版本 $VERSION 的合法 JSON(域名没绑 R2? 回了 HTML?)"; exit 1; }

      # 终验:latest.json 里的每个 url 必须真能下到二进制。
      # 光看 job 绿没用 —— v0.1.0 就是三个 job 全绿、Release 齐全,但 latest.json 的 url
      # 因文件名空格被规范化而全部 404,更新器静默失效。这里主动 HEAD 一遍,404 就把发版打红。
      - name: Verify updater URLs resolve
        shell: bash
        run: |
          set -euo pipefail
          sleep 10   # 给 GitHub 一点时间让资产可下载
          fail=0
          for url in $(python3 -c "
          import json
          d = json.load(open('dist/latest.json'))
          for p in d['platforms'].values():
              print(p['url'])
          " | sort -u); do
            code=$(curl -sSL -o /dev/null -w '%{http_code}' --max-time 60 "$url" || echo 000)
            if [ "$code" = "200" ]; then
              echo "OK   $code  $url"
            else
              echo "::error::更新器 URL 不可达 ($code): $url"
              fail=1
            fi
          done
          [ "$fail" = "0" ] || { echo "::error::latest.json 指向的资产下不下来,更新器会失效"; exit 1; }
